<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel - Mapa do Primeiro Imóvel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F2E9;
    --card: #FFFFFF;
    --ink: #26281F;
    --ink-soft: #6B6A5C;
    --green: #1F3A2E;
    --green-deep: #14261D;
    --gold: #C08A28;
    --gold-soft: #EFE2C2;
    --track: #E4DCC8;
    --danger: #B3452F;
    --azul: #2E5F8A;
    --laranja: #E8B884;
    --laranja-bg: #FDEEDD;
    --radius: 14px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ======= LOGIN ======= */
  #telaLogin {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-box {
    background: var(--card);
    padding: 40px 34px;
    border-radius: 18px;
    box-shadow: 0 12px 32px rgba(38,40,31,0.10);
    max-width: 360px;
    width: 100%;
    text-align: center;
  }

  .login-box h1 {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--green-deep);
    margin: 0 0 6px;
  }

  .login-box p {
    font-size: 13px;
    color: var(--ink-soft);
    margin: 0 0 22px;
  }

  .campo-senha { position: relative; margin-bottom: 12px; }

  .campo-senha input {
    width: 100%;
    padding: 13px 44px 13px 14px;
    font-size: 15px;
    border: 1.5px solid var(--track);
    border-radius: 10px;
    outline: none;
  }

  .campo-senha input:focus { border-color: var(--gold); }

  .btn-olho {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1;
  }

  .btn-olho:hover { color: var(--ink); }

  .login-box button.btn-entrar {
    width: 100%;
    padding: 13px;
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
  }

  .login-box button.btn-entrar:hover { background: var(--green-deep); }

  .login-erro {
    color: var(--danger);
    font-size: 12px;
    margin-top: 10px;
    display: none;
  }

  /* ======= APP ======= */
  #app { display: none; }

  header.topo-painel {
    background: var(--green);
    color: #fff;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  header.topo-painel h1 {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 600;
    margin: 0;
  }

  .topo-controles {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .topo-controles input[type="text"] {
    padding: 9px 12px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    width: 200px;
    outline: none;
  }

  .btn-toggle {
    display: flex;
    background: rgba(255,255,255,0.12);
    border-radius: 8px;
    overflow: hidden;
  }

  .btn-toggle button {
    background: none;
    border: none;
    color: #fff;
    padding: 9px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    opacity: 0.7;
  }

  .btn-toggle button.ativo {
    background: var(--gold);
    color: var(--green-deep);
    opacity: 1;
  }

  .btn-icone {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }

  .btn-icone:hover { background: rgba(255,255,255,0.22); }

  main.conteudo { padding: 22px 24px 60px; max-width: 1450px; margin: 0 auto; }

  .resumo {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .pill-resumo {
    background: var(--card);
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--ink-soft);
    border: 1px solid var(--track);
  }

  .pill-resumo strong { color: var(--ink); font-size: 15px; }

  /* ======= CARDS ======= */
  .grid-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  .lead-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 18px;
    border: 1px solid var(--track);
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.1s;
  }

  .lead-card:hover { box-shadow: 0 8px 20px rgba(38,40,31,0.10); transform: translateY(-2px); }

  .lead-card.incompleto { background: var(--laranja-bg); border-color: var(--laranja); }

  .lead-nome { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .lead-info { font-size: 13px; color: var(--ink-soft); margin-bottom: 3px; }

  .status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .status-Incompleto { background: var(--laranja-bg); color: #A8631C; }
  .status-Completo { background: #DCEAE0; color: var(--green); }
  .status-Em_Atendimento { background: #DDE7F1; color: var(--azul); }
  .status-Qualificado { background: var(--gold-soft); color: #8A6416; }
  .status-Venda_Realizada { background: #D9EEDD; color: #1B5E32; }
  .status-Perdido { background: #E7E4DA; color: var(--ink-soft); }

  .vazio {
    text-align: center;
    color: var(--ink-soft);
    padding: 60px 20px;
    font-size: 14px;
  }

  /* ======= KANBAN ======= */
  .kanban-wrap {
    display: flex;
    gap: 14px;
    overflow-x: auto;
    padding-bottom: 10px;
  }

  .kanban-coluna {
    background: rgba(228, 220, 200, 0.35);
    border-radius: var(--radius);
    min-width: 260px;
    flex: 1;
    padding: 12px;
    min-height: 200px;
  }

  .kanban-coluna.arrastando-sobre { background: var(--gold-soft); }

  .kanban-coluna h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    margin: 4px 4px 12px;
    display: flex;
    justify-content: space-between;
  }

  .kanban-card {
    background: var(--card);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border: 1px solid var(--track);
    font-size: 13px;
    cursor: grab;
  }

  .kanban-card.incompleto { background: var(--laranja-bg); border-color: var(--laranja); }

  .kanban-card:active { cursor: grabbing; }
  .kanban-card .lead-nome { font-size: 13px; margin-bottom: 2px; }
  .kanban-card .lead-info { font-size: 12px; }

  /* ======= MODAL ======= */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20, 38, 29, 0.55);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 50;
  }

  .overlay.ativo { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 16px;
    max-width: 460px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 26px;
  }

  .modal h2 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    color: var(--green-deep);
    margin: 0 0 14px;
  }

  .modal-campo {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    padding: 9px 0;
    border-bottom: 1px solid #F0ECDF;
    font-size: 13px;
  }

  .modal-campo span:first-child { color: var(--ink-soft); }
  .modal-campo span:last-child { font-weight: 600; text-align: right; }

  .modal-acoes {
    display: flex;
    gap: 10px;
    margin-top: 18px;
    flex-wrap: wrap;
  }

  .modal-acoes a, .modal-acoes button {
    flex: 1;
    padding: 11px;
    border-radius: 10px;
    border: none;
    font-size: 13px;
    font-weight: 700;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
  }

  .btn-whatsapp { background: #25D366; color: #fff; }
  .btn-fechar-modal { background: var(--track); color: var(--ink); }

  select.select-status {
    width: 100%;
    margin-top: 14px;
    padding: 10px;
    border-radius: 10px;
    border: 1.5px solid var(--track);
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="telaLogin">
  <div class="login-box">
    <h1>Painel de Leads</h1>
    <p>Mapa do Primeiro Imóvel</p>
    <div class="campo-senha">
      <input type="password" id="inputSenha" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter') entrar()">
      <button type="button" class="btn-olho" id="btnOlho" onclick="alternarSenha()">👁</button>
    </div>
    <button class="btn-entrar" onclick="entrar()">Entrar</button>
    <div class="login-erro" id="loginErro">Senha incorreta.</div>
  </div>
</div>

<div id="app">
  <header class="topo-painel">
    <h1>Painel · Mapa do Primeiro Imóvel</h1>
    <div class="topo-controles">
      <input type="text" id="busca" placeholder="Buscar por nome..." oninput="renderizarTudo()">
      <div class="btn-toggle">
        <button id="btnViewCards" class="ativo" onclick="mudarView('cards')">Cards</button>
        <button id="btnViewKanban" onclick="mudarView('kanban')">Kanban</button>
      </div>
      <button class="btn-icone" onclick="carregarLeads()">Atualizar</button>
      <button class="btn-icone" onclick="sair()">Sair</button>
    </div>
  </header>

  <main class="conteudo">
    <div class="resumo" id="resumo"></div>
    <div id="viewCards" class="grid-cards"></div>
    <div id="viewKanban" class="kanban-wrap" style="display:none;"></div>
  </main>
</div>

<div class="overlay" id="overlayModal">
  <div class="modal" id="modalConteudo"></div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzrqzL_O2vx2cvDOqgV8g5vzmxcVpNZBNGII_I78yYeoAeu1tDmwS3RYEhdzrPzEWMx/exec';
const TOKEN = 'mapa2025-rwneri-imob';

let senhaAtual = sessionStorage.getItem('mapa_painel_senha') || '';
let leads = [];
let viewAtual = 'cards';

/* Colunas visíveis no Kanban */
const COLUNAS_KANBAN = ['Entrada', 'Em Atendimento', 'Qualificado', 'Venda Realizada', 'Perdido'];

/* Todos os status possíveis (usado no seletor do modal) */
const STATUS_POSSIVEIS = ['Incompleto', 'Completo', 'Em Atendimento', 'Qualificado', 'Venda Realizada', 'Perdido'];

const LABELS_CAMPO = {
  nome: 'Nome', telefone: 'Telefone', email: 'E-mail', tipo_imovel: 'Tipo de imóvel',
  quartos: 'Quartos', regiao: 'Região', simulacao_caixa: 'Simulação Caixa',
  renda_bruta: 'Renda bruta', estado_civil: 'Estado civil', tem_filhos_dependem: 'Filhos dependem',
  dependente_terceiro_grau: 'Dependente 3º grau', data_nascimento: 'Data de nascimento',
  teve_imovel_nome: 'Já teve imóvel', mais_3anos_carteira: '+3 anos carteira',
  renda_bruta_familiar: 'Renda familiar', etapa_atual: 'Parou na etapa',
  data_criacao: 'Criado em', data_ultima_atualizacao: 'Última atualização'
};

if (senhaAtual) { verificarELogar(senhaAtual); }

function alternarSenha() {
  const input = document.getElementById('inputSenha');
  const btn = document.getElementById('btnOlho');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

async function entrar() {
  const senha = document.getElementById('inputSenha').value.trim();
  if (!senha) return;
  await verificarELogar(senha);
}

async function verificarELogar(senha) {
  try {
    const resp = await fetch(API_URL + '?senha=' + encodeURIComponent(senha) + '&action=get_leads');
    const data = await resp.json();
    if (data.ok) {
      senhaAtual = senha;
      sessionStorage.setItem('mapa_painel_senha', senha);
      leads = data.leads;
      document.getElementById('telaLogin').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderizarTudo();
    } else {
      document.getElementById('loginErro').style.display = 'block';
      sessionStorage.removeItem('mapa_painel_senha');
    }
  } catch (err) {
    document.getElementById('loginErro').textContent = 'Erro de conexão. Tenta de novo.';
    document.getElementById('loginErro').style.display = 'block';
  }
}

function sair() {
  sessionStorage.removeItem('mapa_painel_senha');
  location.reload();
}

async function carregarLeads() {
  try {
    const resp = await fetch(API_URL + '?senha=' + encodeURIComponent(senhaAtual) + '&action=get_leads');
    const data = await resp.json();
    if (data.ok) {
      leads = data.leads;
      renderizarTudo();
    }
  } catch (err) {
    alert('Não foi possível atualizar os leads agora.');
  }
}

function mudarView(v) {
  viewAtual = v;
  document.getElementById('btnViewCards').classList.toggle('ativo', v === 'cards');
  document.getElementById('btnViewKanban').classList.toggle('ativo', v === 'kanban');
  document.getElementById('viewCards').style.display = v === 'cards' ? 'grid' : 'none';
  document.getElementById('viewKanban').style.display = v === 'kanban' ? 'flex' : 'none';
  renderizarTudo();
}

function leadsFiltrados() {
  const termo = document.getElementById('busca').value.trim().toLowerCase();
  if (!termo) return leads;
  return leads.filter(l => (l.nome || '').toLowerCase().includes(termo));
}

function formatarData(iso) {
  if (!iso) return '-';
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  } catch { return iso; }
}

function classeStatus(status) {
  return 'status-' + (status || 'Incompleto').replace(/\s/g, '_');
}

/* Mapeia o status real do lead pra qual coluna do Kanban ele cai.
   Incompleto e Completo caem juntos na coluna "Entrada". */
function colunaDoLead(status) {
  if (['Em Atendimento', 'Qualificado', 'Venda Realizada', 'Perdido'].includes(status)) return status;
  return 'Entrada';
}

function renderizarTudo() {
  const filtrados = leadsFiltrados();

  const total = leads.length;
  const incompletos = leads.filter(l => l.status_kanban === 'Incompleto').length;
  const emAtendimento = leads.filter(l => l.status_kanban === 'Em Atendimento').length;
  const vendas = leads.filter(l => l.status_kanban === 'Venda Realizada').length;
  document.getElementById('resumo').innerHTML = `
    <div class="pill-resumo"><strong>${total}</strong> leads no total</div>
    <div class="pill-resumo"><strong>${incompletos}</strong> incompletos</div>
    <div class="pill-resumo"><strong>${emAtendimento}</strong> em atendimento</div>
    <div class="pill-resumo"><strong>${vendas}</strong> vendas realizadas</div>
  `;

  if (viewAtual === 'cards') renderizarCards(filtrados);
  else renderizarKanban(filtrados);
}

function renderizarCards(lista) {
  const container = document.getElementById('viewCards');
  if (lista.length === 0) {
    container.innerHTML = '<div class="vazio">Nenhum lead encontrado.</div>';
    return;
  }
  const ordenados = [...lista].sort((a,b) => new Date(b.data_ultima_atualizacao) - new Date(a.data_ultima_atualizacao));
  container.innerHTML = ordenados.map(l => {
    const incompleto = l.status_kanban === 'Incompleto';
    return `
    <div class="lead-card ${incompleto ? 'incompleto' : ''}" onclick="abrirModal('${l.id_lead}')">
      <span class="status-badge ${classeStatus(l.status_kanban)}">${l.status_kanban || 'Incompleto'}</span>
      <div class="lead-nome">${l.nome || 'Sem nome ainda'}</div>
      <div class="lead-info">${l.telefone || 'Telefone não informado'}</div>
      <div class="lead-info">${l.tipo_imovel || ''} ${l.regiao ? '· ' + l.regiao : ''}</div>
      <div class="lead-info">Atualizado: ${formatarData(l.data_ultima_atualizacao)}</div>
    </div>
  `;
  }).join('');
}

function renderizarKanban(lista) {
  const container = document.getElementById('viewKanban');
  container.innerHTML = COLUNAS_KANBAN.map(col => {
    const leadsColuna = lista.filter(l => colunaDoLead(l.status_kanban) === col);
    return `
      <div class="kanban-coluna" data-coluna="${col}" ondragover="permitirDrop(event)" ondrop="soltarCard(event, '${col}')" ondragleave="this.classList.remove('arrastando-sobre')">
        <h3><span>${col}</span><span>${leadsColuna.length}</span></h3>
        ${leadsColuna.map(l => {
          const incompleto = l.status_kanban === 'Incompleto';
          return `
          <div class="kanban-card ${incompleto ? 'incompleto' : ''}" draggable="true" ondragstart="iniciarDrag(event, '${l.id_lead}')" onclick="abrirModal('${l.id_lead}')">
            <div class="lead-nome">${l.nome || 'Sem nome ainda'}</div>
            <div class="lead-info">${l.telefone || ''}</div>
          </div>
        `;
        }).join('')}
      </div>
    `;
  }).join('');
}

let idArrastando = null;

function iniciarDrag(ev, idLead) {
  idArrastando = idLead;
  ev.dataTransfer.effectAllowed = 'move';
}

function permitirDrop(ev) {
  ev.preventDefault();
  ev.currentTarget.classList.add('arrastando-sobre');
}

async function soltarCard(ev, coluna) {
  ev.preventDefault();
  ev.currentTarget.classList.remove('arrastando-sobre');
  if (!idArrastando) return;

  const lead = leads.find(l => l.id_lead === idArrastando);
  if (!lead) { idArrastando = null; return; }

  let novoStatus;
  if (coluna === 'Entrada') {
    /* Ao voltar pra Entrada, mantém a distinção Incompleto/Completo
       com base em já ter nome e e-mail preenchidos. */
    novoStatus = (lead.nome && lead.email) ? 'Completo' : 'Incompleto';
  } else {
    novoStatus = coluna;
  }

  lead.status_kanban = novoStatus;
  renderizarTudo();

  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        token: TOKEN,
        action: 'update_status',
        id_lead: idArrastando,
        status_kanban: novoStatus
      })
    });
  } catch (err) {
    console.error('Falha ao atualizar status', err);
  }
  idArrastando = null;
}

function abrirModal(idLead) {
  const l = leads.find(x => x.id_lead === idLead);
  if (!l) return;

  const ordemCampos = ['nome','telefone','email','tipo_imovel','quartos','regiao','simulacao_caixa',
    'renda_bruta','estado_civil','tem_filhos_dependem','dependente_terceiro_grau','data_nascimento',
    'teve_imovel_nome','mais_3anos_carteira','renda_bruta_familiar','etapa_atual',
    'data_criacao','data_ultima_atualizacao'];

  let camposHtml = '';
  ordemCampos.forEach(chave => {
    let valor = l[chave];
    if (chave === 'data_criacao' || chave === 'data_ultima_atualizacao') valor = formatarData(valor);
    if (!valor) valor = '-';
    camposHtml += `<div class="modal-campo"><span>${LABELS_CAMPO[chave] || chave}</span><span>${valor}</span></div>`;
  });

  const telefoneLimpo = (l.telefone || '').replace(/\D/g, '');
  const linkWhats = telefoneLimpo ? `https://wa.me/55${telefoneLimpo}` : '#';

  document.getElementById('modalConteudo').innerHTML = `
    <span class="status-badge ${classeStatus(l.status_kanban)}">${l.status_kanban || 'Incompleto'}</span>
    <h2>${l.nome || 'Lead sem nome'}</h2>
    ${camposHtml}
    <select class="select-status" onchange="mudarStatusModal('${l.id_lead}', this.value)">
      ${STATUS_POSSIVEIS.map(c => `<option value="${c}" ${c === l.status_kanban ? 'selected' : ''}>${c}</option>`).join('')}
    </select>
    <div class="modal-acoes">
      ${telefoneLimpo ? `<a href="${linkWhats}" target="_blank" class="btn-whatsapp">Chamar no WhatsApp</a>` : ''}
      <button class="btn-fechar-modal" onclick="fecharModal()">Fechar</button>
    </div>
  `;
  document.getElementById('overlayModal').classList.add('ativo');
}

async function mudarStatusModal(idLead, novoStatus) {
  const lead = leads.find(l => l.id_lead === idLead);
  if (lead) lead.status_kanban = novoStatus;
  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        token: TOKEN,
        action: 'update_status',
        id_lead: idLead,
        status_kanban: novoStatus
      })
    });
    renderizarTudo();
  } catch (err) {
    console.error('Falha ao atualizar status', err);
  }
}

function fecharModal() {
  document.getElementById('overlayModal').classList.remove('ativo');
}

document.getElementById('overlayModal').addEventListener('click', (e) => {
  if (e.target.id === 'overlayModal') fecharModal();
});
</script>

</body>
</html>
